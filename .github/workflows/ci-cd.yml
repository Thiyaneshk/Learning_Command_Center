name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 black
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: black --check --diff .
    
    - name: Run tests
      run: pytest --tb=short --strict-markers
    
    - name: Build and test Streamlit app
      run: |
        python -c "import streamlit; print('Streamlit import successful')"
        python -c "from app import init_app; init_app(); print('App initialization successful')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy to Streamlit Cloud
      run: |
        echo "Deployment triggered. Streamlit Cloud will automatically deploy on push to main branch."
        echo "Ensure your Streamlit Cloud app is connected to this repository."